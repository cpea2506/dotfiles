gui:
  mainPanelSplitMode: "flexible"
  language: "en"
  nerdFontsVersion: "3"
  theme:
    selectedLineBgColor:
      - "#4b5261"
  branchColors:
    "docs": blue
    "fix": red
    "feat": green
notARepository: "skip"
git:
  pagers:
    - pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
os:
  edit: "nvim"
update:
  days: 7
