window:
  decorations: buttonless
  opacity: 0.85

  scrolling:
    history: 1000
    multiplier: 3
  padding:
    x: 5
    y: 0
  semantic_escape_chars: ',│`|:"'' ()[]{}<>'
  save_to_clipboard: true
  live_config_reload: true

font:
  normal:
    family: "JetBrainsMonoMedium Nerd Font"
    style: Medium
  bold:
    family: "JetBrainsMonoExtraBold Nerd Font"
    style: Extra Bold
  italic:
    family: "Hack Nerd Font"
    style: Italic
  bold_italic:
    family: "Hack Nerd Font"
    style: Bold Italic
  size: 12.0
  ligatures: true
  use_thin_strokes: true

draw_bold_text_with_bright_colors: true

colors:
  primary:
    background: "#18191a"
    foreground: "#eceef0"
  cursor:
    text: "#000000"
    cursor: "#ee2c68"
  selection:
    text: "#f0f0f0"
    background: "#25b1f5"

  # Normal colors
  normal:
    black: "#000000"
    red: "#ee2c68"
    green: "#3dd177"
    yellow: "#ffc900"
    blue: "#00b0ff"
    magenta: "#ff3f80"
    cyan: "#64fcda"
    white: "#fefefe"

  # Bright colors
  bright:
    black: "#b0bec4"
    red: "#d54e53"
    green: "#82f4a2"
    yellow: "#ffe47e"
    blue: "#80d7fe"
    magenta: "#ff80ab"
    cyan: "#a7fdeb"
    white: "#fefefe"

# Bell
# The bell is rung every time the BEL control character is received.
bell:
  animation: EaseOutExpo
  duration: 0
  color: "#ffffff"

cursor:
  style:
    shape: Underline
  unfocused_hollow: true

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: true

key_bindings:
  - { key: N, mods: Command, action: SpawnNewInstance }
  - { key: N, mods: Command|Shift, action: CreateNewWindow }
